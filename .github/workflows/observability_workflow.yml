name: OpenTelemetry
on:
  workflow_run:
    workflows:
      - Autotriage
      - Autoversion
      - Claude
      - CodeQL
      - Copilot
      - Copilot cloud agent
      - Copilot code review
      - Copilot setup steps
      - OpenAI Codex
      - Recompile Agentic Workflows
      - Renovate
      - Report Failed Workflows
    types:
      - completed
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/workflow@909c7153cce2c6ef916f4fde6958886d9d65af03
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    container: ghcr.io/plengauer/opentelemetry-github-workflow-instrumentation-runner:909c7153cce2c6ef916f4fde6958886d9d65af03
    permissions:
      actions: read
